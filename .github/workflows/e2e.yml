name: e2e

# Brings the full stack up with docker-compose (service + WireMock mocks) and
# runs a smoke test against it, so end-to-end runs pass on GHA against the mocks
# rather than any real third party.
on:
  push:
  pull_request:

jobs:
  e2e:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Start stack (service + WireMock mocks)
        run: docker compose up -d --build

      - name: Wait for WireMock to be healthy
        run: |
          for i in $(seq 1 30); do
            if curl -fsS http://localhost:8080/__admin/health >/dev/null; then
              echo "WireMock healthy"; exit 0
            fi
            sleep 2
          done
          echo "WireMock did not become healthy"; docker compose logs wiremock; exit 1

      - name: Wait for service health endpoint
        run: |
          for i in $(seq 1 30); do
            if curl -fsS http://localhost:3000/health >/dev/null; then
              echo "service healthy"; exit 0
            fi
            sleep 2
          done
          echo "service did not become healthy"; docker compose logs app; exit 1

      - name: Smoke test endpoints
        run: |
          set -euo pipefail
          curl -fsS http://localhost:3000/ | grep -q "Hello"
          curl -fsS http://localhost:3000/health | grep -q "ok"
          created=$(curl -fsS -X POST http://localhost:3000/kenguroos \
            -H 'Content-Type: application/json' \
            -d '{"name":"Joey","age":2}')
          echo "$created" | grep -q '"name":"Joey"'
          curl -fsS http://localhost:3000/kenguroos | grep -q "Joey"
          grass=$(curl -fsS -X POST http://localhost:3000/grass \
            -H 'Content-Type: application/json' \
            -d '{"name":"Bermuda","height":12}')
          echo "$grass" | grep -q '"name":"Bermuda"'
          curl -fsS http://localhost:3000/grass | grep -q "Bermuda"

      - name: Dump logs on failure
        if: failure()
        run: docker compose logs

      - name: Tear down
        if: always()
        run: docker compose down -v
