# Local + CI stack: brings the service up alongside a WireMock mock server so
# `docker-compose up` runs everything end to end without reaching any real
# third party.
#
# NOTE: this block currently makes NO external service calls (greeting, health,
# user-echo and the in-memory kenguroo CRUD are all self-contained). WireMock is
# wired in as the designated mock host with a fail-loud catch-all so that the
# first time an external dependency IS added, the call is caught here instead of
# silently hitting the real internet. Point new external base URLs at
# `EXTERNAL_API_BASE_URL` and add a mapping under wiremock/mappings/.
services:
  app:
    build: .
    ports:
      - "3000:3000"
    environment:
      PORT: "3000"
      # Base URL for any external HTTP dependency. Local/CI -> WireMock mock.
      # In production this is overridden with the real upstream URL.
      EXTERNAL_API_BASE_URL: "http://wiremock:8080"
    depends_on:
      wiremock:
        condition: service_healthy

  wiremock:
    image: wiremock/wiremock:3.9.2
    ports:
      - "8080:8080"
    command:
      - "--global-response-templating"
      - "--disable-banner"
      - "--verbose"
    volumes:
      - ./wiremock/mappings:/home/wiremock/mappings:ro
      - ./wiremock/__files:/home/wiremock/__files:ro
    healthcheck:
      test:
        ["CMD", "/bin/sh", "-c", "wget -qO- http://localhost:8080/__admin/health || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 12
