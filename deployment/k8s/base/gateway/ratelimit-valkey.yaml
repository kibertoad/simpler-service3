# Rate limit counter storage — ephemeral, no persistence required.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ratelimit-valkey
  labels:
    app.kubernetes.io/name: ratelimit-valkey
    app.kubernetes.io/component: rate-limit-cache
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: ratelimit-valkey
  template:
    metadata:
      labels:
        app.kubernetes.io/name: ratelimit-valkey
        app.kubernetes.io/component: rate-limit-cache
    spec:
      containers:
        - name: valkey
          image: 053497547689.dkr.ecr.eu-central-1.amazonaws.com/dockerhub/valkey/valkey:7.2.10-bookworm
          args: ["--save", "", "--appendonly", "no"]
          ports:
            - name: valkey
              containerPort: 6379
          resources:
            requests:
              cpu: 10m
              memory: 16Mi
            limits:
              cpu: 100m
              memory: 64Mi
          readinessProbe:
            exec:
              command: [valkey-cli, ping]
            initialDelaySeconds: 5
            periodSeconds: 3
            timeoutSeconds: 3
            failureThreshold: 5
          livenessProbe:
            exec:
              command: [valkey-cli, ping]
            initialDelaySeconds: 15
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 5
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
              add:
                - CHOWN
                - FOWNER
                - SETUID
                - SETGID
---
apiVersion: v1
kind: Service
metadata:
  name: ratelimit-valkey
  labels:
    app.kubernetes.io/name: ratelimit-valkey
    app.kubernetes.io/component: rate-limit-cache
spec:
  selector:
    app.kubernetes.io/name: ratelimit-valkey
  ports:
    - name: valkey
      port: 6379
      targetPort: valkey
