apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: simpler-service3-prenv

resources:
  - namespace.yaml

  # --- Infrastructure ---
  - services/valkey

  # --- Application ---
  - services/app

  # --- Observability ---
  - services/dozzle

  # --- Gateway ---
  - gateway

labels:
  - pairs:
      app.kubernetes.io/part-of: simpler-service3
      app.kubernetes.io/managed-by: kustomize

# Pod-level seccomp default; container-level hardening is set per-container.
patches:
  - target:
      kind: Deployment
    patch: |-
      apiVersion: apps/v1
      kind: Deployment
      metadata:
        name: _
      spec:
        template:
          spec:
            securityContext:
              seccompProfile:
                type: RuntimeDefault
  - target:
      kind: StatefulSet
    patch: |-
      apiVersion: apps/v1
      kind: StatefulSet
      metadata:
        name: _
      spec:
        template:
          spec:
            securityContext:
              seccompProfile:
                type: RuntimeDefault
